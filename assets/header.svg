<svg fill="none" viewBox="0 0 800 200" width="100%" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Dark container background */
    .bg {
      fill: #0d1117;
      rx: 10px;
    }

    /* Glowing Title Styling */
    .title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 28px;
      font-weight: bold;
      fill: #ffffff;
      letter-spacing: 3px;
      text-anchor: middle;
      animation: pulse 2.5s ease-in-out infinite alternate;
    }

    /* Subtitle Styling */
    .subtitle {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      fill: #8b949e;
      letter-spacing: 2px;
      text-anchor: middle;
    }

    /* Scanline Animation */
    .scanline {
      fill: #ffffff;
      opacity: 0.15;
      animation: scan 4s linear infinite;
    }

    /* Animations */
    @keyframes pulse {
      0% {
        opacity: 0.7;
      }
      100% {
        opacity: 1;
        filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.8));
      }
    }

    @keyframes scan {
      0% {
        transform: translateY(0px);
      }
      100% {
        transform: translateY(200px);
      }
    }
  </style>

  <!-- Background Card -->
  <rect class="bg" width="100%" height="100%" />

  <!-- Animated Scanline -->
  <rect class="scanline" width="100%" height="2" />

  <!-- Title Text -->
  <text x="50%" y="45%" class="title">WELCOME TO MY GITHUB</text>

  <!-- Subtitle Text -->
  <text x="50%" y="65%" class="subtitle">&lt; Web Developer &amp; UI Specialist /&gt;</text>
</svg>

